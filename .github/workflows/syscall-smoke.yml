name: Real syscall smoke

on:
  push:
    branches: [main, "brain/**"]
  pull_request:

permissions:
  contents: read

jobs:
  syscall-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf
          rustup target add x86_64-unknown-uefi x86_64-unknown-none
      - name: Build real syscall smoke kernel
        run: make esp PROFILE=release KERNEL_FEATURES=syscall-smoke
      - name: Verify LSTAR entry, SYSRET and process exit
        shell: bash
        run: |
          OVMF=$(find /usr/share/OVMF -type f \( -name 'OVMF_CODE.fd' -o -name 'OVMF_CODE_4M.fd' -o -name 'OVMF_CODE_2M.fd' \) | head -n 1)
          set +e
          timeout 10s qemu-system-x86_64 -machine q35 -cpu max -m 256M \
            -drive "if=pflash,format=raw,readonly=on,file=$OVMF" \
            -drive "format=raw,file=fat:rw:esp" \
            -display none -monitor none -serial file:syscall.log -net none -no-reboot
          status=$?
          set -e
          cat syscall.log
          test "$status" -eq 124
          grep -q "syscall-smoke: entering real syscall path" syscall.log
          grep -q "user\[44\] write 7 bytes" syscall.log
          grep -q "syscall-smoke: write and exit passed" syscall.log
          ! grep -Eiq '\[ERROR\]|DOUBLE FAULT|kernel panic' syscall.log
