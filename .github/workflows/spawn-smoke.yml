name: Spawn ownership smoke

on:
  push:
    branches: [main, "brain/**"]
  pull_request:

permissions:
  contents: read

jobs:
  spawn-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf
          rustup target add x86_64-unknown-uefi x86_64-unknown-none
      - name: Build spawn ownership smoke kernel
        run: make esp PROFILE=release KERNEL_FEATURES=spawn-smoke
      - name: Verify spawn rollback and successful spawn to Ring 3 exit
        shell: bash
        run: |
          OVMF=$(find /usr/share/OVMF -type f \( -name 'OVMF_CODE.fd' -o -name 'OVMF_CODE_4M.fd' -o -name 'OVMF_CODE_2M.fd' \) | head -n 1)
          set +e
          timeout 10s qemu-system-x86_64 -machine q35 -cpu max -m 256M \
            -drive "if=pflash,format=raw,readonly=on,file=$OVMF" \
            -drive "format=raw,file=fat:rw:esp" \
            -display none -monitor none -serial file:spawn.log -net none -no-reboot
          status=$?
          set -e
          cat spawn.log
          test "$status" -eq 124
          grep -q "spawn-smoke: rollback reclaimed frames and released PID" spawn.log
          grep -q "spawn-smoke: spawned ELF ran to Ring 3 and exited with 37" spawn.log
          ! grep -Eiq '\[ERROR\]|DOUBLE FAULT|kernel panic' spawn.log
