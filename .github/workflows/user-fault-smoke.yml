name: User fault isolation smoke

on:
  push:
    branches: [main, "brain/**"]
  pull_request:

permissions:
  contents: read

jobs:
  user-ud-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf
          rustup target add x86_64-unknown-uefi x86_64-unknown-none
      - run: make esp PROFILE=release KERNEL_FEATURES=user-ud-smoke
      - shell: bash
        run: |
          OVMF=$(find /usr/share/OVMF -type f \( -name 'OVMF_CODE.fd' -o -name 'OVMF_CODE_4M.fd' -o -name 'OVMF_CODE_2M.fd' \) | head -n 1)
          set +e
          timeout 10s qemu-system-x86_64 -machine q35 -cpu max -m 256M \
            -drive "if=pflash,format=raw,readonly=on,file=$OVMF" \
            -drive "format=raw,file=fat:rw:esp" \
            -display none -monitor none -serial file:ud.log -net none -no-reboot
          status=$?
          set -e
          cat ud.log
          test "$status" -eq 124
          grep -q "user-ud-smoke: process fault isolated" ud.log
          grep -q "fault vector=6" ud.log
          ! grep -Eiq '\[ERROR\]|DOUBLE FAULT|kernel panic' ud.log

  user-nx-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf
          rustup target add x86_64-unknown-uefi x86_64-unknown-none
      - run: make esp PROFILE=release KERNEL_FEATURES=user-nx-smoke
      - shell: bash
        run: |
          OVMF=$(find /usr/share/OVMF -type f \( -name 'OVMF_CODE.fd' -o -name 'OVMF_CODE_4M.fd' -o -name 'OVMF_CODE_2M.fd' \) | head -n 1)
          set +e
          timeout 10s qemu-system-x86_64 -machine q35 -cpu max -m 256M \
            -drive "if=pflash,format=raw,readonly=on,file=$OVMF" \
            -drive "format=raw,file=fat:rw:esp" \
            -display none -monitor none -serial file:nx.log -net none -no-reboot
          status=$?
          set -e
          cat nx.log
          test "$status" -eq 124
          grep -q "user-nx-smoke: process fault isolated" nx.log
          grep -q "fault vector=14" nx.log
          ! grep -Eiq '\[ERROR\]|DOUBLE FAULT|kernel panic' nx.log
