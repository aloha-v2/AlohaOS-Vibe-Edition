name: User protection negative smoke

on:
  push:
    branches: [main, "brain/**"]
  pull_request:

permissions:
  contents: read

jobs:
  protection-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: user-write-code-smoke
            marker: "user-write-code-smoke: process fault isolated"
          - feature: user-stack-guard-smoke
            marker: "user-stack-guard-smoke: process fault isolated"
          - feature: user-bad-pointer-smoke
            marker: "user-bad-pointer-smoke: EFAULT returned without kernel fault"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf
          rustup target add x86_64-unknown-uefi x86_64-unknown-none
      - run: make esp PROFILE=release KERNEL_FEATURES=${{ matrix.feature }}
      - shell: bash
        run: |
          OVMF=$(find /usr/share/OVMF -type f \( -name 'OVMF_CODE.fd' -o -name 'OVMF_CODE_4M.fd' -o -name 'OVMF_CODE_2M.fd' \) | head -n 1)
          set +e
          timeout 10s qemu-system-x86_64 -machine q35 -cpu max -m 256M \
            -drive "if=pflash,format=raw,readonly=on,file=$OVMF" \
            -drive "format=raw,file=fat:rw:esp" \
            -display none -monitor none -serial file:negative.log -net none -no-reboot
          status=$?
          set -e
          cat negative.log
          test "$status" -eq 124
          grep -q "${{ matrix.marker }}" negative.log
          ! grep -Eiq '\[ERROR\]|DOUBLE FAULT|kernel panic' negative.log
