name: AlohaOS CI
on:
  push:
    branches: [main, "brain/**"]
  pull_request:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: rustup target add x86_64-unknown-uefi x86_64-unknown-none
      - run: |
          cargo build --release --target x86_64-unknown-uefi -p alohaboot
          cargo build --release --target x86_64-unknown-none -p kernel
  qemu-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf
          rustup target add x86_64-unknown-uefi x86_64-unknown-none
      - run: make esp PROFILE=release
      - name: Boot shell, timer IST and FAT32
        shell: bash
        run: |
          OVMF=$(find /usr/share/OVMF -type f \( -name 'OVMF_CODE.fd' -o -name 'OVMF_CODE_4M.fd' -o -name 'OVMF_CODE_2M.fd' \) | head -n 1)
          set +e
          timeout 15s qemu-system-x86_64 \
            -machine q35 -cpu max -m 256M \
            -drive "if=pflash,format=raw,readonly=on,file=$OVMF" \
            -drive "format=raw,file=fat:rw:esp" \
            -drive "if=none,id=aloha-disk,format=raw,file=disk/aloha-fat32.img" \
            -device "virtio-blk-pci,drive=aloha-disk,disable-modern=on" \
            -display none -monitor none -serial file:serial.log -net none -no-reboot \
            -d guest_errors,cpu_reset -D qemu-debug.log \
            2>qemu-stderr.log
          status=$?
          set -e
          if [ "$status" -ne 124 ] || \
             ! grep -q "interrupts enabled, starting shell" serial.log 2>/dev/null || \
             ! grep -q "storage: virtio_blk=true, fat32=true" serial.log 2>/dev/null || \
             grep -Eiq '\[ERROR\]|DOUBLE FAULT|kernel panic' serial.log 2>/dev/null; then
            serial=$({ tail -n 80 serial.log 2>/dev/null || echo '<missing>'; } | tr '\n' '|' | sed 's/%/%25/g;s/\r/%0D/g' | cut -c1-3500)
            stderr=$({ tail -n 40 qemu-stderr.log 2>/dev/null || echo '<missing>'; } | tr '\n' '|' | sed 's/%/%25/g;s/\r/%0D/g' | cut -c1-1500)
            debug=$({ tail -n 40 qemu-debug.log 2>/dev/null || echo '<missing>'; } | tr '\n' '|' | sed 's/%/%25/g;s/\r/%0D/g' | cut -c1-1500)
            echo "::error file=.github/workflows/ci.yml,line=1,title=QEMU smoke status ${status}::SERIAL=${serial} STDERR=${stderr} DEBUG=${debug}"
            exit 1
          fi
