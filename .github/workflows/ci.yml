name: AlohaOS CI
on:
  push:
    branches: [main, "brain/**"]
  pull_request:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: rustup target add x86_64-unknown-uefi x86_64-unknown-none
      - name: Build
        run: |
          cargo build --release --target x86_64-unknown-uefi -p alohaboot
          cargo build --release --target x86_64-unknown-none -p kernel
  qemu-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf
          rustup target add x86_64-unknown-uefi x86_64-unknown-none
      - run: make esp PROFILE=release
      - name: Boot for 15 seconds
        shell: bash
        run: |
          OVMF=$(find /usr/share/OVMF -type f \( -name 'OVMF_CODE.fd' -o -name 'OVMF_CODE_4M.fd' -o -name 'OVMF_CODE_2M.fd' \) | head -n 1)
          test -n "$OVMF"
          echo "Using OVMF: $OVMF ($(stat -c%s "$OVMF") bytes)"
          set +e
          timeout 15s qemu-system-x86_64 \
            -machine q35 -m 256M \
            -drive "if=pflash,format=raw,readonly=on,file=$OVMF" \
            -drive "format=raw,file=fat:rw:esp" \
            -display none -monitor none -serial file:serial.log \
            -net none -no-reboot >qemu.log 2>&1
          status=$?
          set -e
          cat qemu.log
          test -f serial.log && cat serial.log
          if [ "$status" -ne 124 ]; then
            message=$(tail -n 40 qemu.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=QEMU stopped early::$message"
            exit 1
          fi
          grep -q "interrupts enabled, starting shell" serial.log
          ! grep -Eiq '\[ERROR\]|DOUBLE FAULT|kernel panic' serial.log
