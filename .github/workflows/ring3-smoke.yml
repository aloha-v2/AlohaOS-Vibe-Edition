name: Ring 3 smoke

on:
  push:
    branches: [main, "brain/**"]
  pull_request:

permissions:
  contents: read

jobs:
  ring3-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf
          rustup target add x86_64-unknown-uefi x86_64-unknown-none
      - name: Build Ring 3 smoke kernel
        run: make esp PROFILE=release KERNEL_FEATURES=ring3-smoke
      - name: Verify iretq, TSS RSP0 and controlled user trap
        shell: bash
        run: |
          OVMF=$(find /usr/share/OVMF -type f \( -name 'OVMF_CODE.fd' -o -name 'OVMF_CODE_4M.fd' -o -name 'OVMF_CODE_2M.fd' \) | head -n 1)
          set +e
          timeout 10s qemu-system-x86_64 -machine q35 -cpu max -m 256M \
            -drive "if=pflash,format=raw,readonly=on,file=$OVMF" \
            -drive "format=raw,file=fat:rw:esp" \
            -display none -monitor none -serial file:ring3.log -net none -no-reboot
          status=$?
          set -e
          cat ring3.log
          test "$status" -eq 124
          grep -q "ring3-smoke: entering user mode" ring3.log
          grep -q "ring3-smoke: user iretq rsp0 trap passed" ring3.log
          ! grep -Eiq '\[ERROR\]|DOUBLE FAULT|kernel panic' ring3.log
