# Kernel-specific link and ABI settings for the bare-metal target.
[target.x86_64-unknown-none]
rustflags = [
    "-C", "link-arg=-Tkernel/kernel.ld",
    "-C", "relocation-model=static",
    # Hardware interrupts may use the current stack at any instruction. The
    # SysV red zone is therefore unsafe in a preemptive kernel.
    "-C", "no-redzone=yes",
]
